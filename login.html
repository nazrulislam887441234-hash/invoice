<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Ghoti Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Hind Siliguri', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #2c3e50, #4ca1af); padding: 20px; }
        .box { background: white; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .logo-img { width: 80px; height: auto; margin-bottom: 15px; }
        h2 { margin: 0 0 10px; color: #333; font-size: 24px; }
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: #aaa; }
        input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button.main-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .linkBtn { background: none; color: #555; border: none; margin-top: 10px; cursor: pointer; display: block; width: 100%; font-size: 14px; text-decoration: underline; }
        #pageLoader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; }
    </style>
</head>
<body>
    <div id="pageLoader">অপেক্ষা করুন...</div>

    <div class="box">
        <img src="https://www.ghotimarket.com/logo.png" alt="Ghoti Market Logo" class="logo-img" />
        <h2>GHOTI MARKET</h2>
        <h2>Seller Login</h2>
        <h2> Invoice Generator</h2>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="আপনার ইমেইল" />
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="pass" placeholder="পাসওয়ার্ড" />
        </div>
        <button id="loginBtn" class="main-btn">প্রবেশ করুন</button>
        <button id="resetBtn" class="linkBtn">পাসওয়ার্ড ভুলে গেছেন?</button>
        <a href="https://seller.ghotimarket.com/signup.html" style="text-decoration:none;">
            <button class="main-btn" style="background:#27ae60;">সেলার একাউন্ট কিভাবে বানাবেন?</button>
        </a>
    </div>

    <script type="module">
        // Firebase মডিউলগুলো লোড হওয়ার জন্য অপেক্ষা না করে দ্রুত স্ক্রিপ্ট রান করার জন্য
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBUhNhYvuo_FTvZ5RZR6Gn-4hsUY21S0XE", projectId: "ghotimarket", authDomain: "ghotimarket.firebaseapp.com" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, browserLocalPersistence);

        // ইউজার চেক করার সময় লডার সরানো
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists() && snap.data().verified) {
                    window.location.href = "dashboard.html";
                } else {
                    document.getElementById('pageLoader').style.display = 'none';
                }
            } else {
                document.getElementById('pageLoader').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const e = document.getElementById('email').value.trim();
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("ইমেইল এবং পাসওয়ার্ড দিন!");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, e, p);
                const snap = await getDoc(doc(db, "users", userCredential.user.uid));
                if(!snap.exists() || !snap.data().verified) {
                    alert("অ্যাকাউন্ট ভেরিফাইড হয়নি!");
                    await auth.signOut();
                } else {
                    window.location.href = "dashboard.html";
                }
            } catch (err) {
                alert("ভুল ইমেইল অথবা পাসওয়ার্ড!");
            }
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if(!email) return alert("আগে আপনার ইমেইলটি লিখুন!");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("রিসেট লিংক ইমেইলে পাঠানো হয়েছে।");
            } catch (err) { alert("ভুল ইমেইল!"); }
        });
    </script>
</body>
</html>
